name: Publish MSIX to Microsoft Store

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            git fetch --tags --force origin
            LATEST_TAG=$(git tag -l 'v*.*.*' | sort -V | tail -1)
            if [[ -z "$LATEST_TAG" ]]; then
              echo "::error::No existing version tag found to use for a manual dispatch run"
              exit 1
            fi
            VERSION=${LATEST_TAG#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $VERSION"

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure MSStore CLI credentials
        run: |
          $maxAttempts = 10
          $delaySeconds = 15
          for ($i = 1; $i -le $maxAttempts; $i++) {
            msstore reconfigure --tenantId ${{ secrets.AZURE_TENANT_ID }} --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }} --clientId ${{ secrets.AZURE_CLIENT_ID }} --clientSecret ${{ secrets.AZURE_CLIENT_SECRET }}
            if ($LASTEXITCODE -eq 0) { break }
            Write-Warning "Attempt $i/$maxAttempts failed (exit $LASTEXITCODE). Retrying in $delaySeconds s..."
            if ($i -lt $maxAttempts) { Start-Sleep -Seconds $delaySeconds }
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "msstore reconfigure failed after $maxAttempts attempts."
            exit 1
          }

      - name: List Store apps (debug)
        run: |
          $maxAttempts = 10
          $delaySeconds = 15
          for ($i = 1; $i -le $maxAttempts; $i++) {
            msstore apps list
            if ($LASTEXITCODE -eq 0) { break }
            Write-Warning "Attempt $i/$maxAttempts failed (exit $LASTEXITCODE). Retrying in $delaySeconds s..."
            if ($i -lt $maxAttempts) { Start-Sleep -Seconds $delaySeconds }
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "msstore apps list failed after $maxAttempts attempts."
            exit 1
          }

      - name: Check for pending submission
        run: |
          $maxAttempts = 10
          $delaySeconds = 15
          $output = $null
          for ($i = 1; $i -le $maxAttempts; $i++) {
            $output = msstore submission status 9PN7LZ0ZNX9X 2>&1 | Out-String
            if ($LASTEXITCODE -eq 0) { break }
            Write-Warning "Attempt $i/$maxAttempts failed (exit $LASTEXITCODE). Retrying in $delaySeconds s..."
            if ($i -lt $maxAttempts) { Start-Sleep -Seconds $delaySeconds }
          }
          Write-Output $output
          if ($LASTEXITCODE -ne 0) {
            Write-Error "msstore submission status failed after $maxAttempts attempts."
            exit 1
          }
          $clean = $output -replace '\x1b\[[\d;]*[mGKHF]', ''
          if ($clean -match 'Submission Status\s*=\s*(\S+)') {
            $status = $Matches[1].Trim()
            $blocking = @('PendingCommit','CommitStarted','PendingPublication','Publishing','PreProcessing','Certification','Release')
            if ($blocking -contains $status) {
              Write-Error "A submission is already in progress (status: $status). Wait for it to complete or cancel it in Partner Center before pushing again."
              exit 1
            }
          }

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Set version in csproj
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $csproj  = "wahlberg.maui/Wahlberg.Maui.csproj"
          $xml     = [xml](Get-Content $csproj)
          $xml.SelectSingleNode("//ApplicationDisplayVersion").InnerText = $version
          $xml.Save((Resolve-Path $csproj))

      - name: Publish Windows MSIX (Store upload)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:AppxPackageSigningEnabled=false
          -p:UapAppxPackageBuildMode=StoreUpload
          -p:AppxSymbolPackageEnabled=false

      - name: Submit to Microsoft Store
        run: |
          $maxAttempts = 10
          $delaySeconds = 15
          for ($i = 1; $i -le $maxAttempts; $i++) {
            msstore publish wahlberg.maui --appId 9PN7LZ0ZNX9X
            if ($LASTEXITCODE -eq 0) { break }
            Write-Warning "Attempt $i/$maxAttempts failed (exit $LASTEXITCODE). Retrying in $delaySeconds s..."
            if ($i -lt $maxAttempts) { Start-Sleep -Seconds $delaySeconds }
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Error "msstore publish failed after $maxAttempts attempts."
            exit 1
          }

