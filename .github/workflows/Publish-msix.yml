name: Publish MSIX to Microsoft Store

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            git fetch --tags --force origin
            LATEST_TAG=$(git tag -l 'v*.*.*' | sort -V | tail -1)
            if [[ -z "$LATEST_TAG" ]]; then
              echo "::error::No existing version tag found to use for a manual dispatch run"
              exit 1
            fi
            VERSION=${LATEST_TAG#v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $VERSION"

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure MSStore CLI credentials
        env:
          MSSTORE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          MSSTORE_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          MSSTORE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          MSSTORE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          . ./.github/scripts/MsstoreHelpers.ps1
          Invoke-WithRetry -Description "msstore reconfigure" -Action {
            msstore reconfigure --tenantId "$env:MSSTORE_TENANT_ID" --sellerId "$env:MSSTORE_SELLER_ID" --clientId "$env:MSSTORE_CLIENT_ID" --clientSecret "$env:MSSTORE_CLIENT_SECRET"
          }

      - name: List Store apps (debug)
        run: |
          . ./.github/scripts/MsstoreHelpers.ps1
          Invoke-WithRetry -Description "msstore apps list" -Action { msstore apps list }

      - name: Check for pending submission
        run: |
          . ./.github/scripts/MsstoreHelpers.ps1
          $status = Get-MsstoreSubmissionStatus -AppId "9PN7LZ0ZNX9X"
          if ($status -and $script:BlockingSubmissionStatuses -contains $status) {
            Write-Error "A submission is already in progress (status: $status). Wait for it to complete or cancel it in Partner Center before pushing again."
            exit 1
          }

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Set version in csproj
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $csproj  = "wahlberg.maui/Wahlberg.Maui.csproj"
          $xml     = [xml](Get-Content $csproj)
          $xml.SelectSingleNode("//ApplicationDisplayVersion").InnerText = $version
          $xml.Save((Resolve-Path $csproj))

      - name: Publish Windows MSIX (Store upload)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:AppxPackageSigningEnabled=false
          -p:UapAppxPackageBuildMode=StoreUpload
          -p:AppxSymbolPackageEnabled=false

      - name: Submit to Microsoft Store
        run: |
          . ./.github/scripts/MsstoreHelpers.ps1
          $appId = "9PN7LZ0ZNX9X"

          # Re-check right before publishing — the build/packaging steps between the earlier
          # "Check for pending submission" step and here can take several minutes, long enough
          # for another run (or a manual Partner Center action) to have started a submission.
          $preflightStatus = Get-MsstoreSubmissionStatus -AppId $appId
          if ($preflightStatus -and $script:BlockingSubmissionStatuses -contains $preflightStatus) {
            Write-Error "A submission is already in progress (status: $preflightStatus). Wait for it to complete or cancel it in Partner Center before pushing again."
            exit 1
          }

          $maxAttempts = 10
          $delaySeconds = 15
          # Tracked explicitly rather than trusting $LASTEXITCODE after the loop — the
          # status-check call below runs its own commands and overwrites $LASTEXITCODE.
          $succeeded = $false
          for ($i = 1; $i -le $maxAttempts; $i++) {
            msstore publish wahlberg.maui --appId $appId
            if ($LASTEXITCODE -eq 0) { $succeeded = $true; break }

            Write-Warning "Attempt $i/$maxAttempts of 'msstore publish' failed (exit $LASTEXITCODE)."

            # A "failed" attempt can still have been accepted server-side (e.g. a transient
            # network error after the request went through) — check status before retrying
            # so we don't create a duplicate submission.
            $status = Get-MsstoreSubmissionStatus -AppId $appId
            if ($status -and $script:BlockingSubmissionStatuses -contains $status) {
              Write-Host "A submission was created by the previous attempt (status: $status) despite the reported failure — not retrying, to avoid a duplicate."
              $succeeded = $true
              break
            }

            if ($i -lt $maxAttempts) {
              Write-Warning "No in-progress submission detected; retrying in $delaySeconds s..."
              Start-Sleep -Seconds $delaySeconds
            }
          }
          if (-not $succeeded) {
            Write-Error "msstore publish failed after $maxAttempts attempts."
            exit 1
          }

