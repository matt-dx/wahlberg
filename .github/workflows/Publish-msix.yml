name: Publish MSIX to Microsoft Store

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version $VERSION"

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure MSStore CLI credentials
        run: >
          msstore reconfigure
          --tenantId ${{ secrets.AZURE_TENANT_ID }}
          --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          --clientId ${{ secrets.AZURE_CLIENT_ID }}
          --clientSecret ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Check for pending submission
        run: |
          $output = msstore submission status 9PN7LZ0ZNX9X 2>&1 | Out-String
          $clean = $output -replace '\x1b\[[\d;]*[mGKHF]', ''
          if ($clean -match 'Submission Status\s*=\s*(\S+)') {
            $status = $Matches[1].Trim()
            $blocking = @('PendingCommit','CommitStarted','PendingPublication','Publishing','PreProcessing','Certification','Release')
            if ($blocking -contains $status) {
              Write-Error "A submission is already in progress (status: $status). Wait for it to complete or cancel it in Partner Center before pushing again."
              exit 1
            }
          }

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Set version in csproj
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $csproj  = "wahlberg.maui/Wahlberg.Maui.csproj"
          $xml     = [xml](Get-Content $csproj)
          $xml.SelectSingleNode("//ApplicationDisplayVersion").InnerText = $version
          $xml.Save((Resolve-Path $csproj))

      - name: Publish Windows MSIX (Store upload)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:AppxPackageSigningEnabled=false
          -p:UapAppxPackageBuildMode=StoreUpload
          -p:AppxSymbolPackageEnabled=false

      - name: Submit to Microsoft Store
        run: msstore publish wahlberg.maui --appId 9PN7LZ0ZNX9X

      - name: Submit winget manifest
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $id      = "MattWhitwam.Wahlberg"
          $version = "${{ steps.version.outputs.version }}"
          $branch  = "add-$id-$version"

          gh repo fork microsoft/winget-pkgs --clone=false
          $ghUser = gh api user --jq '.login'
          # Get zip URL and SHA256 from the GitHub Release for this tag
          $zipUrl  = gh release view "v$version" --repo matt-dx/wahlberg --json assets --jq '.assets[] | select(.name=="Wahlberg-windows-x64.zip") | .browserDownloadUrl'
          Invoke-WebRequest -Uri $zipUrl -OutFile release.zip
          $sha256  = (Get-FileHash release.zip -Algorithm SHA256).Hash.ToLower()
          Remove-Item release.zip

          gh repo clone "$ghUser/winget-pkgs" winget-pkgs-repo -- --depth=1
          Set-Location winget-pkgs-repo
          gh auth setup-git

          git config user.email "matthew.whitwam@dealx.com"
          git config user.name "Matt Whitwam"
          git checkout -B $branch

          $pkgDir = "manifests/m/MattWhitwam/Wahlberg/$version"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.yaml" -Encoding UTF8

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "Installers:",
            "- Architecture: x64",
            "  InstallerType: zip",
            "  InstallerUrl: $zipUrl",
            "  InstallerSha256: $sha256",
            "  NestedInstallerType: portable",
            "  NestedInstallerFiles:",
            "  - RelativeFilePath: Wahlberg.exe",
            "ManifestType: installer",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.installer.yaml" -Encoding UTF8

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "PackageLocale: en-US",
            "Publisher: Matt Whitwam",
            "PublisherUrl: https://github.com/matt-dx/wahlberg",
            "PackageName: Wahlberg",
            "License: Proprietary",
            "ShortDescription: A cross-platform Markdown viewer built with .NET MAUI and Blazor.",
            "Tags:",
            "- markdown",
            "- viewer",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.locale.en-US.yaml" -Encoding UTF8

          git add -- $pkgDir
          git commit -m "Add $id $version"
          git push origin $branch --force-with-lease

          $existingPr = gh pr list --repo microsoft/winget-pkgs --head "${ghUser}:${branch}" --json url --jq '.[0].url'
          if ($existingPr) {
            Write-Host "PR already exists: $existingPr"
          } else {
            gh pr create `
              --repo microsoft/winget-pkgs `
              --title "Add $id $version" `
              --body "Add $id version $version." `
              --head "${ghUser}:${branch}"
          }
