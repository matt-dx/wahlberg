name: Publish MSIX to Microsoft Store

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'store-assets/**'

permissions:
  contents: read

jobs:
  publish-msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure MSStore CLI credentials
        run: >
          msstore reconfigure
          --tenantId ${{ secrets.AZURE_TENANT_ID }}
          --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          --clientId ${{ secrets.AZURE_CLIENT_ID }}
          --clientSecret ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Check for pending submission
        run: |
          $result = msstore submission status 9PN7LZ0ZNX9X | ConvertFrom-Json
          $blocking = @('PendingCommit','CommitStarted','PendingPublication','Publishing','PreProcessing','Certification','Release')
          if ($blocking -contains $result.status) {
            Write-Error "A submission is already in progress (status: $($result.status)). Wait for it to complete or cancel it in Partner Center before pushing again."
            exit 1
          }

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish Windows MSIX (Store upload)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:AppxPackageSigningEnabled=false
          -p:UapAppxPackageBuildMode=StoreUpload
          -p:AppxSymbolPackageEnabled=false

      - name: Find MSIX package
        id: find-msix
        run: |
          $pkg = Get-ChildItem -Recurse -Include "*.msixupload","*.msix" |
            Where-Object { $_.FullName -notmatch "_Test" -and $_.FullName -notmatch "Dependencies" } |
            Select-Object -First 1
          if (-not $pkg) { Write-Error "No .msix or .msixupload file found"; exit 1 }
          echo "msix_dir=$($pkg.DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Submit to Microsoft Store
        run: msstore publish wahlberg.maui --appId 9PN7LZ0ZNX9X --inputDirectory "${{ steps.find-msix.outputs.msix_dir }}" --noCommit
