name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CLAUDE.md'
      - '.gitignore'
      - 'store-assets/**'
      #- '.github/workflows/Publish-msix.yml'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Set version in csproj
        run: |
          $version = "1.${{ github.run_number }}.0"
          $csproj  = "wahlberg.maui/Wahlberg.Maui.csproj"
          $xml     = [xml](Get-Content $csproj)
          $xml.SelectSingleNode("//ApplicationDisplayVersion").InnerText = $version
          $xml.Save((Resolve-Path $csproj))

      - name: Publish Windows (self-contained exe)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -o publish/windows

      - name: Zip Windows output
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/Wahlberg-windows-x64.zip

      - name: Publish Android
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-android
          -c Release
          -o publish/android

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "v1.${{ github.run_number }}.0" \
            publish/Wahlberg-windows-x64.zip \
            publish/android/*.apk \
            --title 'Release v1.${{ github.run_number }}.0' \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}

      - name: Submit winget manifest
        env:
          GH_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $id      = "MattWhitwam.Wahlberg"
          $version = "1.${{ github.run_number }}.0"
          $branch  = "add-$id-$version"
          $zipUrl  = "https://github.com/matt-dx/wahlberg/releases/download/v$version/Wahlberg-windows-x64.zip"
          $sha256  = (Get-FileHash publish/Wahlberg-windows-x64.zip -Algorithm SHA256).Hash.ToLower()

          gh repo fork microsoft/winget-pkgs --clone=false
          $ghUser = gh api user --jq '.login'
          gh repo clone "$ghUser/winget-pkgs" winget-pkgs-repo -- --depth=1
          Set-Location winget-pkgs-repo
          gh auth setup-git

          git config user.email "matthew.whitwam@dealx.com"
          git config user.name "Matt Whitwam"
          git checkout -B $branch

          $pkgDir = "manifests/m/MattWhitwam/Wahlberg/$version"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.yaml" -Encoding UTF8

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "Installers:",
            "- Architecture: x64",
            "  InstallerType: zip",
            "  InstallerUrl: $zipUrl",
            "  InstallerSha256: $sha256",
            "  NestedInstallerType: portable",
            "  NestedInstallerFiles:",
            "  - RelativeFilePath: Wahlberg.exe",
            "ManifestType: installer",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.installer.yaml" -Encoding UTF8

          (@(
            "# yaml-language-server: `$schema=https://aka.ms/winget-manifest.defaultLocale.1.9.0.schema.json",
            "PackageIdentifier: $id",
            "PackageVersion: $version",
            "PackageLocale: en-US",
            "Publisher: Matt Whitwam",
            "PublisherUrl: https://github.com/matt-dx/wahlberg",
            "PackageName: Wahlberg",
            "License: Proprietary",
            "ShortDescription: A cross-platform Markdown viewer built with .NET MAUI and Blazor.",
            "Tags:",
            "- markdown",
            "- viewer",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.9.0"
          ) -join "`n") | Set-Content "$pkgDir/$id.locale.en-US.yaml" -Encoding UTF8

          git add -- $pkgDir
          git commit -m "Add $id $version"
          git push origin $branch --force-with-lease

          $existingPr = gh pr list --repo microsoft/winget-pkgs --head "${ghUser}:${branch}" --json url --jq '.[0].url'
          if ($existingPr) {
            Write-Host "PR already exists: $existingPr"
          } else {
            gh pr create `
              --repo microsoft/winget-pkgs `
              --title "Add $id $version" `
              --body "Add $id version $version." `
              --head "${ghUser}:${branch}"
          }
