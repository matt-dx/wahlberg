name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows (x64, self-contained)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -r win10-x64
          -c Release
          --self-contained true
          -o publish/windows

      - name: Zip release artifact
        run: Compress-Archive -Path publish/windows/* -DestinationPath publish/Wahlberg-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release #${{ github.run_number }}
          files: publish/Wahlberg-windows-x64.zip
          generate_release_notes: true