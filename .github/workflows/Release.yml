name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'store-assets/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Publish Windows MSIX (Store upload)
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-windows10.0.19041.0
          -c Release
          -p:AppxPackageSigningEnabled=false
          -p:UapAppxPackageBuildMode=StoreUpload
          -p:AppxSymbolPackageEnabled=false

      - name: Find MSIX package
        run: |
          $pkg = Get-ChildItem -Recurse -Include "*.msixupload","*.msix" |
            Where-Object { $_.FullName -notmatch "_Test" -and $_.FullName -notmatch "Dependencies" } |
            Select-Object -First 1
          if (-not $pkg) { Write-Error "No .msix or .msixupload file found"; exit 1 }
          echo "MSIX_PATH=$($pkg.FullName)" >> $env:GITHUB_ENV
          echo "MSIX_DIR=$($pkg.DirectoryName)" >> $env:GITHUB_ENV

      - name: Publish Android
        run: >
          dotnet publish wahlberg.maui/Wahlberg.Maui.csproj
          -f net10.0-android
          -c Release
          -o publish/android

      - name: Install MSStore CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure MSStore CLI credentials
        run: >
          msstore reconfigure
          --tenantId ${{ secrets.AZURE_TENANT_ID }}
          --sellerId ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          --clientId ${{ secrets.AZURE_CLIENT_ID }}
          --clientSecret ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Submit to Microsoft Store
        run: msstore publish wahlberg.maui --appId 9PN7LZ0ZNX9X --inputDirectory "${{ env.MSIX_DIR }}"

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "v${{ github.run_number }}" \
            "$MSIX_PATH" \
            publish/android/*.apk \
            --title 'Release #${{ github.run_number }}' \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
